function cityFor(h){for(const c of CITIES){if(h<=c.max)return c;}return CITIES[CITIES.length-1];}
function fmtH(h){const m=Math.round(h*60);const H=Math.floor(m/60),M=m%60;return H>0?`${H}시간 ${M}분`:`${M}분`;}

/* ===== 대륙 러프 폴리곤 ([lon,lat]) ===== */
const LAND=[
 [[-168,65],[-155,71],[-130,70],[-100,72],[-82,73],[-64,60],[-56,52],[-52,47],[-66,44],[-70,42],[-75,35],[-81,25],[-90,19],[-97,16],[-105,20],[-114,28],[-124,40],[-130,48],[-140,59],[-160,60],[-168,65]],
 [[-45,60],[-30,68],[-18,72],[-20,82],[-40,83],[-56,78],[-52,68],[-46,62],[-45,60]],
 [[-80,9],[-60,11],[-52,5],[-48,-2],[-35,-6],[-38,-14],[-48,-25],[-58,-35],[-66,-45],[-74,-52],[-71,-40],[-70,-25],[-76,-12],[-81,-3],[-80,9]],
 [[-17,15],[-8,28],[0,36],[11,37],[23,33],[33,31],[43,12],[51,11],[45,2],[40,-4],[40,-16],[33,-27],[20,-35],[15,-30],[12,-16],[9,-2],[3,4],[-8,7],[-17,15]],
 [[-10,44],[-9,36],[0,38],[10,38],[19,40],[28,41],[30,45],[40,48],[38,55],[30,60],[24,66],[15,63],[8,58],[-2,52],[-8,50],[-10,44]],
 [[30,60],[38,55],[40,48],[45,42],[48,40],[56,27],[60,25],[68,24],[75,8],[80,8],[88,22],[93,22],[98,10],[106,10],[110,18],[118,22],[122,30],[128,42],[135,50],[142,54],[160,62],[178,68],[160,73],[120,76],[90,78],[60,70],[45,68],[36,66],[30,60]],
 [[95,6],[105,1],[118,5],[128,6],[140,-3],[132,-8],[120,-9],[108,-7],[100,2],[95,6]],
 [[113,-22],[122,-18],[130,-11],[142,-11],[146,-18],[153,-27],[150,-38],[140,-38],[129,-32],[115,-35],[113,-22]],
 [[166,-46],[172,-41],[178,-38],[174,-34],[168,-44],[166,-46]],
 [[129,31],[135,34],[141,37],[146,44],[141,42],[133,34],[129,31]],
 [[125,34],[126,38],[128,41],[130,42],[130,38],[129,35],[127,34],[125,34]],
 [[68,8],[77,8],[80,13],[88,22],[92,22],[80,30],[74,32],[70,24],[68,8]],
 [[7,44],[12,46],[15,42],[18,40],[16,38],[13,42],[8,44],[7,44]],
 [[35,12],[43,12],[56,25],[52,29],[42,29],[36,20],[35,12]],
 [[-25,-58],[-55,-63],[-100,-72],[-150,-75],[-180,-78],[180,-78],[100,-66],[40,-68],[-20,-70],[-25,-58]]
];
function isLand(lon,lat){
  for(const poly of LAND){
    let inside=false;
    for(let i=0,j=poly.length-1;i<poly.length;j=i++){
      const xi=poly[i][0],yi=poly[i][1],xj=poly[j][0],yj=poly[j][1];
      if(((yi>lat)!==(yj>lat)) && (lon < (xj-xi)*(lat-yi)/(yj-yi)+xi)) inside=!inside;
    }
    if(inside) return true;
  }
  return false;
}

/* ===== equirect 캔버스: 대륙 면 + 히트맵 ===== */
const TW=1024,TH=512;
let baseCanvas,heatCanvas,globeTex;
function lonlatToXY(lon,lat){return [ (lon+180)/360*TW, (90-lat)/180*TH ];}
function buildGlobeTexture(){
  // 바다 배경
  baseCanvas=document.createElement('canvas');baseCanvas.width=TW;baseCanvas.height=TH;
  const b=baseCanvas.getContext('2d');
  b.fillStyle='#FBEAC6';b.fillRect(0,0,TW,TH);
  // 위경선(아주 옅게)
  b.strokeStyle='rgba(217,112,10,0.10)';b.lineWidth=1;
  for(let lon=-180;lon<=180;lon+=30){const [x]=lonlatToXY(lon,0);b.beginPath();b.moveTo(x,0);b.lineTo(x,TH);b.stroke();}
  for(let lat=-60;lat<=60;lat+=30){const [,y]=lonlatToXY(0,lat);b.beginPath();b.moveTo(0,y);b.lineTo(TW,y);b.stroke();}
  // (대륙은 점으로 그림 — 여기선 바다 배경만)
  // 히트맵 레이어(투명 시작)
  heatCanvas=document.createElement('canvas');heatCanvas.width=TW;heatCanvas.height=TH;
  globeTex=new THREE.CanvasTexture(composited());
  globeTex.needsUpdate=true;
}
function composited(){
  const c=document.createElement('canvas');c.width=TW;c.height=TH;const x=c.getContext('2d');
  x.drawImage(baseCanvas,0,0);x.drawImage(heatCanvas,0,0);
  return c;
}
function stampHeat(lon,lat){
  const h=heatCanvas.getContext('2d');
  const [cx,cy]=lonlatToXY(lon,lat);
  const rad=44;
  const g=h.createRadialGradient(cx,cy,0,cx,cy,rad);
  g.addColorStop(0,'rgba(226,75,60,0.42)');   // 코랄/레드 번짐
  g.addColorStop(0.5,'rgba(226,75,60,0.16)');
  g.addColorStop(1,'rgba(226,75,60,0)');
  h.globalCompositeOperation='source-over';
  h.fillStyle=g;h.beginPath();h.arc(cx,cy,rad,0,7);h.fill();
  // 코어 점
  h.fillStyle='rgba(200,40,30,0.55)';h.beginPath();h.arc(cx,cy,5,0,7);h.fill();
  refreshTex();
}
let _rt=null;
function refreshTex(){ if(_rt)return; _rt=requestAnimationFrame(()=>{ globeTex.image=composited(); globeTex.needsUpdate=true; _rt=null; }); }

/* ===== three.js ===== */
const R=100;let scene,camera,renderer,globe,pinLayer;
const app=document.getElementById('app');
function ll2v(lat,lon,r){const phi=(90-lat)*Math.PI/180,theta=(lon+180)*Math.PI/180;
  return new THREE.Vector3(-r*Math.sin(phi)*Math.cos(theta),r*Math.cos(phi),r*Math.sin(phi)*Math.sin(theta));}

function emojiSprite(ch,px,scale){
  const c=document.createElement('canvas');c.width=c.height=160;const x=c.getContext('2d');
  x.textAlign='center';x.textBaseline='middle';x.font=px+'px sans-serif';x.fillText(ch,80,88);
  const m=new THREE.SpriteMaterial({map:new THREE.CanvasTexture(c),transparent:true,depthTest:true});
  const s=new THREE.Sprite(m);s.scale.set(scale,scale,1);return s;
}
function labelCanvas(city,rank){
  const medal=rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':'';
  const c=document.createElement('canvas');c.width=420;c.height=110;const x=c.getContext('2d');
  x.fillStyle='#17130D';x.fillRect(6,6,408,98);
  x.fillStyle='#FFF3D6';x.fillRect(12,12,396,86);
  x.font='900 46px "Noto Sans KR",sans-serif';x.textAlign='center';x.textBaseline='middle';
  const txt=(medal?medal+' ':'')+city;
  x.fillStyle='#17130D';x.fillText(txt,210,58);
  return new THREE.CanvasTexture(c);
}
function labelSprite(city){
  const m=new THREE.SpriteMaterial({map:labelCanvas(city,0),transparent:true,depthTest:true});
  const s=new THREE.Sprite(m);s.scale.set(39,10.2,1);return s;
}

function init(){
  scene=new THREE.Scene();
  camera=new THREE.PerspectiveCamera(38,innerWidth/innerHeight,1,3000);
  camera.position.set(0,10,300);camera.lookAt(0,-30,0);
  renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.setSize(innerWidth,innerHeight);
  app.appendChild(renderer.domElement);

  globe=new THREE.Group();scene.add(globe);globe.rotation.z=0.26;globe.position.y=-82;

  // 크림 코어 (뒷면 점 가림)
  globe.add(new THREE.Mesh(new THREE.SphereGeometry(R*0.98,48,48),
    new THREE.MeshBasicMaterial({color:0xF7E4B8})));
  // 림/그림자
  globe.add(new THREE.Mesh(new THREE.SphereGeometry(R*1.02,48,48),
    new THREE.MeshBasicMaterial({color:0xFE933F,transparent:true,opacity:0.10,side:THREE.BackSide})));

  // 바다/히트맵용 텍스처 구체 (대륙은 아래 점으로)
  buildGlobeTexture();
  globe.add(new THREE.Mesh(new THREE.SphereGeometry(R*0.998,64,64),
    new THREE.MeshBasicMaterial({map:globeTex})));

  // 대륙 픽셀 점 (육지=진한 오렌지)
  const cLand=new THREE.Color(0xC4661A);
  const landPts=[],landCols=[];
  for(let lat=-84;lat<=84;lat+=2.2){for(let lon=-180;lon<180;lon+=2.2){
    if(isLand(lon,lat)){const v=ll2v(lat,lon,R);landPts.push(v.x,v.y,v.z);landCols.push(cLand.r,cLand.g,cLand.b);}
  }}
  const gLand=new THREE.BufferGeometry();
  gLand.setAttribute('position',new THREE.Float32BufferAttribute(landPts,3));
  gLand.setAttribute('color',new THREE.Float32BufferAttribute(landCols,3));
  globe.add(new THREE.Points(gLand,new THREE.PointsMaterial({size:2.9,vertexColors:true,sizeAttenuation:true})));

  pinLayer=new THREE.Group();globe.add(pinLayer);

  addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
  animate();
}

const pinsByKey={};
function updateRanks(){
  const arr=Object.values(pinsByKey).sort((a,b)=>b.count-a.count);
  arr.forEach((p,i)=>{
    const sc=20+Math.min(p.count,22)*1.9; p.ico.scale.set(sc,sc,1);
    const rank=i<3?i+1:0;
    if(p._rank!==rank){ p._rank=rank; p.lab.material.map=labelCanvas(p.city,rank); p.lab.material.needsUpdate=true; }
  });
}

function addPin(c){
  let p=pinsByKey[c.key];
  if(!p){
    const grp=new THREE.Group();
    const base=ll2v(c.lat,c.lon,R),dir=base.clone().normalize();
    // 검은 기둥
    const top=dir.clone().multiplyScalar(R+9);
    grp.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([base,top]),
      new THREE.LineBasicMaterial({color:0x17130D})));
    // 랜드마크 이모지
    const ico=emojiSprite(c.icon,120,26);ico.position.copy(dir.clone().multiplyScalar(R+16));grp.add(ico);
    // 도시 라벨
    const lab=labelSprite(c.city);lab.position.copy(dir.clone().multiplyScalar(R+25));grp.add(lab);
    pinLayer.add(grp);
    p=pinsByKey[c.key]={grp,ico,lab,city:c.city,base:R+16,dir,count:0,born:performance.now()};
  }
  p.count++;p.born=performance.now();
  stampHeat(c.lon,c.lat);
}

/* ===== 보드/데이터 ===== */
let entries=[],total=0;
function addEntry(name,hours){
  const c=cityFor(hours);addPin(c);entries.push({name,hours,c});total++;
  updateRanks();showFly(c,hours);spinTo(c);renderBoard();
}
function renderBoard(){
  document.getElementById('total').textContent=total;
  const agg={};for(const e of entries){const k=e.c.key;if(!agg[k])agg[k]={c:e.c,n:0};agg[k].n++;}
  const rows=Object.values(agg).sort((a,b)=>b.n-a.n);
  document.getElementById('list').innerHTML=rows.map(r=>{
    const pct=total>0?Math.round(r.n/total*100):0;
    return `<div class="row"><span class="em">${r.c.icon}</span><span class="city">${r.c.city}</span><span class="cnt">${r.n}명</span><span class="pct">${pct}%</span></div>`;
  }).join('');
  renderPodium();
}
function renderPodium(){
  const top3=[...entries].sort((a,b)=>b.hours-a.hours).slice(0,3);
  for(let i=0;i<3;i++){
    const rank=i+1,e=top3[i];
    const nameEl=document.getElementById('p'+rank+'-name'),cityEl=document.getElementById('p'+rank+'-city'),hrEl=document.getElementById('p'+rank+'-hr');
    if(!e){nameEl.textContent='–';cityEl.textContent='–';hrEl.textContent='--';continue;}
    nameEl.textContent=e.name?e.name:'익명';
    cityEl.textContent=e.c.emoji+' '+e.c.city;
    hrEl.textContent=fmtH(e.hours);
  }
}
function showFly(c,hours){
  document.getElementById('fly-em').textContent=c.icon;
  document.getElementById('fly-city').textContent=c.emoji+' '+c.city;
  document.getElementById('fly-lm').textContent=c.lm;
  document.getElementById('fly-jt').textContent='사회적 시차 '+fmtH(hours)+' · '+c.quip;
  const f=document.getElementById('flyin');f.classList.add('show');
  clearTimeout(showFly._t);showFly._t=setTimeout(()=>f.classList.remove('show'),2600);
}

let targetY=null;
function spinTo(c){const theta=(c.lon+180)*Math.PI/180;targetY=-theta+Math.PI/2;}
function animate(){
  requestAnimationFrame(animate);
  if(targetY!==null){let d=targetY-globe.rotation.y;d=Math.atan2(Math.sin(d),Math.cos(d));globe.rotation.y+=d*0.06;if(Math.abs(d)<0.01)targetY=null;}
  else globe.rotation.y+=0.0015;
  const t=performance.now();
  for(const k in pinsByKey){const p=pinsByKey[k];const r=p.base+Math.sin(t/500+p.dir.x)*1.5;p.ico.position.copy(p.dir.clone().multiplyScalar(r));}
  renderer.render(scene,camera);
}

window.addEntry=addEntry;
// 같은 브라우저(키오스크)에서 테스트 패드로 보낸 결과도 반영
try{const bc=new BroadcastChannel('cirkadian');bc.onmessage=(e)=>{if(e.data&&typeof e.data.hours==='number')addEntry(e.data.name||'',e.data.hours);};}catch(_){}

/* ===== Supabase 실시간 랭킹 ===== */
async function loadInitialBoard(){
  if(!supa)return;
  const since=new Date(Date.now()-1000*60*60*12).toISOString(); // 최근 12시간
  const {data,error}=await supa.from('board_events').select('city_key,social_jetlag_min,nickname,created_at').gte('created_at',since).order('created_at',{ascending:true}).limit(500);
  if(error){console.warn('board load failed',error);return;}
  for(const row of data){
    const c=CITIES.find(x=>x.key===row.city_key);if(!c)continue;
    addPin(c);entries.push({name:row.nickname||'',hours:row.social_jetlag_min/60,c});total++;
  }
  updateRanks();renderBoard();
}
function subscribeBoard(){
  if(!supa)return;
  supa.channel('board_events_live')
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'board_events'},(payload)=>{
      const row=payload.new;const c=CITIES.find(x=>x.key===row.city_key);if(!c)return;
      addEntry(row.nickname||'',row.social_jetlag_min/60);
    })
    .subscribe();
}

init();renderBoard();
if(supa){ loadInitialBoard(); subscribeBoard(); }
</script>
